<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Article</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
        }

        body {
            margin: 0;
            padding: 32px 16px;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .page {
            max-width: 720px;
            margin: 0 auto;
        }

        .form-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        h1 {
            margin: 0 0 20px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 11px 12px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text);
            background: #fff;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        textarea {
            min-height: 210px;
            resize: vertical;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button,
        .link-button {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        button {
            background: var(--primary);
            color: #fff;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .link-button {
            background: #eef2ff;
            color: #1e40af;
        }
    </style>
</head>
<body>
<main class="page">
    <div class="form-container">
        <h1>New Article</h1>
        <form action="/articles/new" method="POST">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Enter article title" required>
            </div>
            <div class="form-group">
                <label for="date">Publishing Date</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" placeholder="Write your article..." required></textarea>
            </div>
            <div class="actions">
                <button type="submit">Publish</button>
                <a class="link-button" href="/dashboard">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
