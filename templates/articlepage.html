<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
        }

        body {
            margin: 0;
            padding: 32px 16px;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .page {
            max-width: 900px;
            margin: 0 auto;
        }

        .article-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .article-title {
            margin: 0 0 8px;
            font-size: 32px;
        }

        .article-date {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 14px;
        }

        .article-content {
            margin: 0;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .back-home {
            margin-top: 14px;
        }

        .back-home a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .back-home a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>
<main class="page">
    <article class="article-container">
        <h1 class="article-title">{{.Title}}</h1>
        <p class="article-date">Published: {{.Published}}</p>
        <p class="article-content">{{.Content}}</p>
    </article>
    <div class="back-home">
        <a href="/">Back to home</a>
    </div>
</main>
</body>
</html>
