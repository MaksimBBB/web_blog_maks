services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-blog
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-your-admin-password}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - blog-articles:/app/articles
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  blog-articles:
